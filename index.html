<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a1a1a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Examen de Hapkido</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            color: #e0e0e0;
            overflow-x: hidden;
        }
        .app {
            max-width: 600px;
            margin: 0 auto;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ========== START SCREEN / MENU ========== */
        .start-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 0;
        }
        .hero-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            width: 100%;
            min-height: 100vh;
            padding: 20px;
        }
        .hero-icon { font-size: 5em; margin-bottom: 16px; }
        .hero-title { font-size: 1.8em; color: #fff; margin-bottom: 8px; font-weight: 700; }
        .hero-subtitle { color: #aaa; font-size: 0.95em; margin-bottom: 28px; }
        .hero-subtitle span { color: #e94560; font-weight: bold; }
        .hero-btn {
            padding: 18px 60px;
            background: linear-gradient(135deg, #e94560, #c0392b);
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 8px 30px rgba(233, 69, 96, 0.4);
            transition: all 0.2s ease;
            min-width: 240px;
        }
        .hero-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 35px rgba(233, 69, 96, 0.5);
        }
        .hero-btn:active { transform: scale(0.97); }

        /* Sections Menu Screen */
        .sections-screen {
            display: none;
            flex-direction: column;
            padding: 0 16px 24px;
            min-height: 100vh;
            animation: slideUp 0.4s ease;
        }
        .sections-screen.show { display: flex; }
        .sections-header {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px 16px 16px;
            position: relative;
        }
        .sections-header-title {
            font-size: 1.2em;
            font-weight: 700;
            color: #fff;
        }
        .back-btn-menu {
            position: absolute;
            left: 0;
            background: rgba(255,255,255,0.1);
            border: none;
            color: #fff;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 1.2em;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .back-btn-menu:active { background: rgba(255,255,255,0.2); }

        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            width: 100%;
            margin-bottom: 20px;
        }
        .menu-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 16px 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.25s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        .menu-card:hover {
            background: rgba(233, 69, 96, 0.1);
            border-color: rgba(233, 69, 96, 0.3);
            transform: translateY(-2px);
        }
        .menu-card:active { transform: scale(0.97); }
        .menu-card-icon { font-size: 1.8em; }
        .menu-card-title { font-size: 0.8em; font-weight: 600; color: #fff; line-height: 1.3; }
        .menu-card-count { font-size: 0.7em; color: #888; }

        .menu-card.full-exam {
            grid-column: 1 / -1;
            background: linear-gradient(135deg, rgba(233, 69, 96, 0.15), rgba(180, 30, 50, 0.15));
            border: 2px solid rgba(233, 69, 96, 0.4);
            padding: 20px 12px;
            flex-direction: row;
            justify-content: center;
            gap: 16px;
        }
        .menu-card.full-exam:hover {
            background: linear-gradient(135deg, rgba(233, 69, 96, 0.25), rgba(180, 30, 50, 0.25));
            border-color: #e94560;
        }
        .menu-card.full-exam .menu-card-icon { font-size: 2.2em; }
        .menu-card.full-exam .menu-card-title { font-size: 1em; }
        .menu-card.full-exam .menu-card-count { font-size: 0.8em; color: #e94560; }


        /* ========== EXAM SCREEN ========== */
        #examScreen { display: none; }
        .header {
            background: linear-gradient(135deg, #1a1a2e, #2a2a4e);
            padding: 16px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 2px solid #e94560;
        }
        .header h1 { font-size: 1.2em; color: #fff; margin-bottom: 4px; }
        .header p { color: #aaa; font-size: 0.8em; }

        /* Progress Bar */
        .progress-container {
            background: rgba(255,255,255,0.05);
            height: 6px;
            width: 100%;
        }
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #e94560, #f39c12);
            transition: width 0.4s ease;
            width: 0%;
        }
        .progress-info {
            display: flex;
            justify-content: space-between;
            padding: 8px 16px;
            background: rgba(15, 12, 41, 0.9);
            font-size: 0.8em;
            color: #aaa;
        }

        /* Score Bar */
        .score-bar {
            display: flex;
            justify-content: center;
            gap: 12px;
            padding: 10px 16px;
            background: rgba(15, 12, 41, 0.8);
        }
        .score-pill {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: bold;
        }
        .pill-correct { background: rgba(39, 174, 96, 0.2); color: #2ecc71; border: 1px solid #27ae60; }
        .pill-wrong { background: rgba(231, 76, 60, 0.2); color: #e74c3c; border: 1px solid #e74c3c; }
        .pill-percentage {
            background: rgba(243, 156, 18, 0.2);
            color: #f39c12;
            border: 1px solid #f39c12;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            padding: 16px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* Question Card */
        .question-card {
            background: rgba(255,255,255,0.06);
            border-radius: 20px;
            padding: 24px 20px;
            border: 1px solid rgba(255,255,255,0.1);
            animation: slideUp 0.4s ease;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .section-tag {
            display: inline-block;
            background: rgba(233, 69, 96, 0.2);
            color: #e94560;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.75em;
            font-weight: bold;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .question-text {
            font-size: 1.15em;
            color: #fff;
            line-height: 1.5;
            margin-bottom: 20px;
            font-weight: 500;
        }

        /* Options */
        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .option {
            padding: 16px 18px;
            background: rgba(255,255,255,0.08);
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.95em;
            color: #ddd;
            line-height: 1.4;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .option:active { transform: scale(0.98); }
        .option-letter {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 0.9em;
            flex-shrink: 0;
        }
        .option:hover {
            background: rgba(233, 69, 96, 0.15);
            border-color: rgba(233, 69, 96, 0.4);
        }
        .option.correct {
            background: rgba(39, 174, 96, 0.2) !important;
            border-color: #27ae60 !important;
            color: #2ecc71;
        }
        .option.correct .option-letter { background: #27ae60; color: white; }
        .option.wrong {
            background: rgba(231, 76, 60, 0.2) !important;
            border-color: #e74c3c !important;
            color: #e74c3c;
        }
        .option.wrong .option-letter { background: #e74c3c; color: white; }
        .option.disabled { pointer-events: none; opacity: 0.6; }

        /* Feedback */
        .feedback {
            margin-top: 16px;
            padding: 14px 16px;
            border-radius: 12px;
            font-size: 0.9em;
            display: none;
            animation: fadeIn 0.3s ease;
        }
        .feedback.show { display: block; }
        .feedback-correct {
            background: rgba(39, 174, 96, 0.15);
            color: #2ecc71;
            border-left: 4px solid #27ae60;
        }
        .feedback-wrong {
            background: rgba(231, 76, 60, 0.15);
            color: #e74c3c;
            border-left: 4px solid #e74c3c;
        }
        .feedback-correct-text { color: #2ecc71; font-weight: bold; margin-top: 6px; }

        /* Next Button */
        .next-btn {
            margin-top: 16px;
            padding: 16px;
            background: linear-gradient(135deg, #e94560, #c0392b);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            display: none;
            animation: fadeIn 0.3s ease;
        }
        .next-btn.show { display: block; }
        .next-btn:active { transform: scale(0.98); }

        /* Back Button */
        .back-btn {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255,255,255,0.1);
            border: none;
            color: #fff;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-size: 1.2em;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .back-btn:active { background: rgba(255,255,255,0.2); }

        /* ========== RESULTS SCREEN ========== */
        .results-screen {
            display: none;
            text-align: center;
            padding: 24px 16px;
            animation: slideUp 0.5s ease;
            min-height: 100vh;
        }
        .results-screen.show { display: block; }
        .results-icon { font-size: 4em; margin-bottom: 16px; }
        .results-title { font-size: 1.6em; color: #e94560; margin-bottom: 8px; }
        .results-score { font-size: 3em; font-weight: bold; color: #f39c12; margin: 12px 0; }
        .results-percentage { font-size: 1.3em; color: #f39c12; }
        .results-message { font-size: 1em; color: #ccc; margin: 16px 0; line-height: 1.5; }
        .results-detail {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin: 20px 0;
        }
        .detail-box {
            padding: 16px 24px;
            border-radius: 16px;
            min-width: 100px;
        }
        .detail-correct { background: rgba(39, 174, 96, 0.15); border: 2px solid #27ae60; }
        .detail-wrong { background: rgba(231, 76, 60, 0.15); border: 2px solid #e74c3c; }
        .detail-number { font-size: 2em; font-weight: bold; }
        .detail-label { font-size: 0.8em; color: #aaa; margin-top: 4px; }

        /* Wrong Answers List */
        .wrong-list {
            text-align: left;
            margin-top: 20px;
            max-height: 400px;
            overflow-y: auto;
        }
        .wrong-item {
            background: rgba(231, 76, 60, 0.08);
            border: 1px solid rgba(231, 76, 60, 0.25);
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 8px;
            font-size: 0.85em;
        }
        .wrong-item .q-text { color: #e74c3c; font-weight: bold; margin-bottom: 4px; }
        .wrong-item .q-answer { color: #2ecc71; }

        /* Action Buttons */
        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 20px;
            max-width: 320px;
            margin-left: auto;
            margin-right: auto;
        }
        .action-btn {
            padding: 16px 40px;
            border: none;
            border-radius: 30px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .action-btn:active { transform: scale(0.97); }
        .btn-primary {
            background: linear-gradient(135deg, #e94560, #c0392b);
            color: white;
            box-shadow: 0 8px 25px rgba(233, 69, 96, 0.4);
        }
        .btn-secondary {
            background: rgba(255,255,255,0.08);
            color: #ddd;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .btn-secondary:hover {
            background: rgba(255,255,255,0.15);
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Hide scrollbar */
        ::-webkit-scrollbar { width: 0px; background: transparent; }

        /* Responsive */
        @media (min-width: 480px) {
            .menu-grid { grid-template-columns: repeat(3, 1fr); }
            .menu-card.full-exam { grid-column: 1 / -1; }
        }
    </style>
<base target="_blank">
</head>
<body>
    <div class="app">
        <!-- START SCREEN (Hero) -->
        <div class="start-screen" id="startScreen">
            <div class="hero-section">
                <div class="hero-icon">🥋</div>
                <div class="hero-title">Examen de Hapkido</div>
                <div class="hero-subtitle"><span id="totalQuestionsCount">246</span> preguntas de selección simple</div>
                <button class="hero-btn" onclick="showSectionsMenu()">Comenzar</button>
            </div>
        </div>

        <!-- SECTIONS MENU SCREEN -->
        <div class="sections-screen" id="sectionsScreen">
            <div class="sections-header">
                <button class="back-btn-menu" onclick="backToStart()">←</button>
                <div class="sections-header-title">📚 Selecciona una sección</div>
            </div>
            <div class="menu-grid" id="menuGrid"></div>
        </div>

        <!-- EXAM SCREEN -->
        <div id="examScreen">
            <div class="header" style="position:relative;">
                <button class="back-btn" onclick="confirmExit()" title="Volver al menú">←</button>
                <h1>🥋 Examen de Hapkido</h1>
                <p id="headerProgress">Pregunta 1 de 246</p>
            </div>
            <div class="progress-container">
                <div class="progress-bar" id="progressBar"></div>
            </div>
            <div class="progress-info">
                <span id="progressText">Progreso: 0%</span>
                <span id="sectionText">Sección: General</span>
            </div>
            <div class="score-bar">
                <span class="score-pill pill-correct" id="correctPill">✓ 0</span>
                <span class="score-pill pill-wrong" id="wrongPill">✗ 0</span>
                <span class="score-pill pill-percentage" id="percentagePill">📊 0%</span>
            </div>

            <div class="main-content">
                <div class="question-card" id="questionCard">
                    <div class="section-tag" id="sectionTag">SECCIÓN</div>
                    <div class="question-text" id="questionText">Cargando...</div>
                    <div class="options" id="optionsContainer"></div>
                    <div class="feedback" id="feedback"></div>
                    <button class="next-btn" id="nextBtn" onclick="nextQuestion()">Siguiente Pregunta →</button>
                </div>
            </div>
        </div>

        <!-- RESULTS SCREEN -->
        <div class="results-screen" id="resultsScreen">
            <div class="results-icon" id="resultsIcon">🏆</div>
            <div class="results-title" id="resultsTitle">¡Examen Completado!</div>
            <div class="results-score" id="resultsScore">0/246</div>
            <div class="results-percentage" id="resultsPercentage">0%</div>
            <div class="results-message" id="resultsMessage"></div>
            <div class="results-detail">
                <div class="detail-box detail-correct">
                    <div class="detail-number" id="detailCorrect" style="color:#2ecc71">0</div>
                    <div class="detail-label">Correctas</div>
                </div>
                <div class="detail-box detail-wrong">
                    <div class="detail-number" id="detailWrong" style="color:#e74c3c">0</div>
                    <div class="detail-label">Incorrectas</div>
                </div>
            </div>
            <div class="wrong-list" id="wrongList"></div>
            <div class="action-buttons">
                <button class="action-btn btn-primary" onclick="restartSameSection()">🔄 Repetir Esta Sección</button>
                <button class="action-btn btn-secondary" onclick="backToMenu()">📋 Menú Principal</button>
            </div>
        </div>
    </div>

    <script>
        const QUESTIONS = [
  {
    "q": "¿Qué es BAKAT PALMOK MONTONG YOP MAKI?",
    "opts": [
      "Defensa lateral con el borde externo del antebrazo",
      "Defensa al medio con manos cruzadas",

    ],
    "corr": 0,
    "sec": "Defensas",
    "corr_txt": "Defensa lateral con el borde externo del antebrazo"
  },
  {
    "q": "¿Qué arte se desarrolló en secreto durante 500 años y quiénes lo practicaban?",
    "opts": [
      "Los Reyes iniciaron las artes culturales. Mientras el arte florecía, la violencia decrecía y lentamente el arte del combatiente fue reemplazado. Los que siguieron con los viejos principios fueron desterrados a un monasterio en las montañas de Corea.",
      "El Hwarando. Cada Rey reunió un grupo élite de jóvenes guerreros especializados y disciplinados en el arte de matar con las manos desnudas. Siguió así por 200 años.",
      "El Taek-Kyon, desarrollado por los hijos de las personas desterradas convertidos en monjes. Era un arte de derribar con las patadas.",

  },
  {

    "opts": [

    "corr_txt": "El maestro Kang, fundador del Taekwondo en Venezuela (1973)."
  },
  {
    "q": "¿Qué es BANDAL CHAGUI?",

    "corr": 2,

  {

  {

    ],
    "corr": 1,
    "sec": "Técnicas de Pierna",
    "corr_txt": "Patada enganchando"
  },
  {
    "q": "Nombra 6 tipos de inmovilizaciones vistas en el material:",
    "opts": [
      "Control laterocostal en bufanda, Variante del control laterocostal en bufanda, Control por el hombro, Control superior sobre cuatro puntos de apoyo, Control lateral sobre cuatro puntos de apoyo, Control sobre cuatro puntos de apoyo a horcajadas",

  },
  {

    "opts": [

    ],
    "corr": 2,
    "sec": "Clasificación por Posición",
    "corr_txt": "Colocar frente a frente"
  },
  {
    "q": "¿Qué significa SIMPAN JYONG?",
    "opts": [
      "Zona de competición",

    "corr": 1,

    "corr_txt": "Reglas de competición"
  },
  {

        function shuffleArray(array) {
            const shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        // ========== MENU ==========
        function buildMenu() {
            const grid = document.getElementById('menuGrid');
            grid.innerHTML = '';

            // Add individual section cards
            const sectionNames = Object.keys(SECTIONS).sort();
            sectionNames.forEach(sec => {
                const count = SECTIONS[sec].length;
                const icon = SECTION_ICONS[sec] || '📋';
                const card = document.createElement('div');
                card.className = 'menu-card';
                card.innerHTML = `
                    <div class="menu-card-icon">${icon}</div>
                    <div class="menu-card-title">${sec}</div>
                    <div class="menu-card-count">${count} preguntas</div>
                `;
                card.onclick = function() { startSectionExam(sec); };
                grid.appendChild(card);
            });

            // Add "Full Exam" card at the end
            const fullCard = document.createElement('div');
            fullCard.className = 'menu-card full-exam';
            fullCard.innerHTML = `
                <div class="menu-card-icon">🏆</div>
                <div>
                    <div class="menu-card-title">Examen Completo</div>
                    <div class="menu-card-count">${QUESTIONS.length} preguntas · Todas las secciones</div>
                </div>
            `;
            fullCard.onclick = function() { startFullExam(); };
            grid.appendChild(fullCard);
        }

        function showSectionsMenu() {
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('sectionsScreen').classList.add('show');
        }

        function backToStart() {
            document.getElementById('sectionsScreen').classList.remove('show');
            document.getElementById('startScreen').style.display = 'flex';
        }

        function startSectionExam(sectionName) {
            currentSection = sectionName;
            questions = shuffleArray([...SECTIONS[sectionName]]);
            startExamCommon();
        }

        function startFullExam() {
            currentSection = null;
            questions = shuffleArray([...QUESTIONS]);
            startExamCommon();
        }

        function startExamCommon() {
            currentIndex = 0;
            correctCount = 0;
            wrongCount = 0;
            wrongAnswers = [];
            answered = false;
            totalQuestions = questions.length;

            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('sectionsScreen').classList.remove('show');
            document.getElementById('examScreen').style.display = 'block';
            document.getElementById('resultsScreen').classList.remove('show');

            showQuestion();
        }

        // ========== EXAM ==========
        function showQuestion() {
            answered = false;
            const q = questions[currentIndex];

            // Update progress
            const progress = Math.round(((currentIndex) / totalQuestions) * 100);
            document.getElementById('progressBar').style.width = progress + '%';
            document.getElementById('progressText').textContent = 'Progreso: ' + progress + '%';
            document.getElementById('headerProgress').textContent = 'Pregunta ' + (currentIndex + 1) + ' de ' + totalQuestions;
            document.getElementById('sectionText').textContent = 'Sección: ' + q.sec;

            // Update question card
            document.getElementById('sectionTag').textContent = q.sec;
            document.getElementById('questionText').textContent = q.q;

            // Generate options
            const optsContainer = document.getElementById('optionsContainer');
            optsContainer.innerHTML = '';

            q.opts.forEach(function(opt, idx) {
                const div = document.createElement('div');
                div.className = 'option';
                div.setAttribute('data-idx', idx);
                div.setAttribute('data-correct', idx === q.corr ? '1' : '0');
                div.innerHTML = '<div class="option-letter">' + String.fromCharCode(65 + idx) + '</div><div>' + opt + '</div>';
                div.onclick = function() { selectOption(this); };
                optsContainer.appendChild(div);
            });

            // Reset feedback and next button
            document.getElementById('feedback').className = 'feedback';
            document.getElementById('feedback').innerHTML = '';
            document.getElementById('nextBtn').classList.remove('show');

            // Update score pills
            updateScorePills();

            // Animation
            const card = document.getElementById('questionCard');
            card.style.animation = 'none';
            setTimeout(function() { card.style.animation = 'slideUp 0.4s ease'; }, 10);
        }

        function updateScorePills() {
            document.getElementById('correctPill').textContent = '✓ ' + correctCount;
            document.getElementById('wrongPill').textContent = '✗ ' + wrongCount;
            const pct = totalQuestions > 0 ? Math.round((correctCount / (correctCount + wrongCount || 1)) * 100) : 0;
            document.getElementById('percentagePill').textContent = '📊 ' + pct + '%';
        }

        function selectOption(element) {
            if (answered) return;
            answered = true;

            const q = questions[currentIndex];
            const selectedIdx = parseInt(element.getAttribute('data-idx'));
            const isCorrect = element.getAttribute('data-correct') === '1';

            // Disable all options and show correct one
            const allOpts = document.querySelectorAll('.option');
            allOpts.forEach(function(opt) {
                opt.classList.add('disabled');
                if (opt.getAttribute('data-correct') === '1') {
                    opt.classList.add('correct');
                }
            });

            const feedback = document.getElementById('feedback');

            if (isCorrect) {
                correctCount++;
                element.classList.add('correct');
                feedback.className = 'feedback feedback-correct show';
                feedback.innerHTML = '✅ ¡Correcto! Bien hecho.';
            } else {
                wrongCount++;
                element.classList.add('wrong');
                feedback.className = 'feedback feedback-wrong show';
                feedback.innerHTML = '❌ Incorrecto.<div class="feedback-correct-text">✅ Respuesta correcta: ' + q.corr_txt + '</div>';
                wrongAnswers.push({
                    num: currentIndex + 1,
                    question: q.q,
                    correct: q.corr_txt,
                    selected: q.opts[selectedIdx],
                    section: q.sec
                });
            }

            // Update score pills in real time
            updateScorePills();

            // Show next button
            const nextBtn = document.getElementById('nextBtn');
            if (currentIndex < totalQuestions - 1) {
                nextBtn.textContent = 'Siguiente Pregunta →';
            } else {
                nextBtn.textContent = 'Ver Resultados 🏆';
            }
            nextBtn.classList.add('show');
        }

        function nextQuestion() {
            currentIndex++;
            if (currentIndex < totalQuestions) {
                showQuestion();
            } else {
                showResults();
            }
        }

        function confirmExit() {
            if (confirm('¿Seguro que quieres salir del examen? Perderás tu progreso actual.')) {
                backToMenu();
            }
        }

        // ========== RESULTS ==========
        function showResults() {
            document.getElementById('examScreen').style.display = 'none';
            document.getElementById('resultsScreen').classList.add('show');

            const percentage = Math.round((correctCount / totalQuestions) * 100);

            document.getElementById('resultsScore').textContent = correctCount + '/' + totalQuestions;
            document.getElementById('resultsPercentage').textContent = percentage + '%';
            document.getElementById('detailCorrect').textContent = correctCount;
            document.getElementById('detailWrong').textContent = wrongCount;

            // Title based on section or full exam
            const titleEl = document.getElementById('resultsTitle');
            if (currentSection) {
                titleEl.textContent = '¡' + currentSection + ' - Completado!';
            } else {
                titleEl.textContent = '¡Examen Completo - Completado!';

            // Icon and message
            let icon = '🏆';
            let message = '';
            if (percentage >= 90) {
                icon = '🏆';
                message = '¡Excelente! Dominas el material completamente. ¡Cinturón negro de conocimiento!';
            } else if (percentage >= 75) {
                icon = '🥇';
                message = '¡Muy bien! Tienes un gran dominio del material. ¡Sigue así!';
            } else if (percentage >= 60) {
                icon = '🥈';
                message = '¡Bien! Conoces lo esencial, pero hay áreas para repasar.';
            } else if (percentage >= 40) {
                icon = '🥉';
                message = '¡No te rindas! Necesitas repasar más el cuestionario.';
            } else {
                icon = '📖';
                message = 'Te recomiendo leer el cuestionario completo nuevamente antes de reintentar.';
            }

            document.getElementById('resultsIcon').textContent = icon;
            document.getElementById('resultsMessage').textContent = message;

            // Wrong answers list
            const wrongList = document.getElementById('wrongList');
            if (wrongAnswers.length > 0) {
                let html = '<h3 style="color:#e94560;margin-bottom:12px;font-size:1em;">📋 Preguntas incorrectas para repasar (' + wrongAnswers.length + '):</h3>';
                wrongAnswers.forEach(function(item) {
                    html += '<div class="wrong-item">' +
                        '<div style="color:#888;font-size:0.75em;margin-bottom:2px;">[' + item.section + ']</div>' +
                        '<div class="q-text">#' + item.num + '. ' + item.question + '</div>' +
                        '<div style="color:#e74c3c;text-decoration:line-through;margin:4px 0;">❌ ' + item.selected + '</div>' +
                        '<div class="q-answer">✅ ' + item.correct + '</div>' +
                        '</div>';
                });
                wrongList.innerHTML = html;
            } else {
                wrongList.innerHTML = '<div style="color:#2ecc71;font-size:1.1em;padding:20px;">🎉 ¡Perfecto! No tuviste ninguna respuesta incorrecta.</div>';
            }
        }

        function restartSameSection() {
            document.getElementById('resultsScreen').classList.remove('show');
            if (currentSection) {
                startSectionExam(currentSection);
            } else {
                startFullExam();
            }
        }

        function backToMenu() {
            document.getElementById('resultsScreen').classList.remove('show');
            document.getElementById('examScreen').style.display = 'none';
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('sectionsScreen').classList.add('show');
            currentSection = null;
        }

        // Initialize menu on load
        buildMenu();
    </script>
</body>
</html>
